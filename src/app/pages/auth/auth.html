<div class="auth-wrapper">
  <div class="auth-container">
    <div class="auth-card shadow">
      
      <!-- Title with thick underline -->
      <div class="auth-header">
        <h1 class="auth-title">{{ isLoginMode ? 'ĐĂNG NHẬP' : 'ĐĂNG KÝ' }}</h1>
        <div class="title-underline"></div>
      </div>

      <form (ngSubmit)="onSubmit()" #authForm="ngForm" class="auth-form">
        <!-- Register only fields -->
        <div class="form-group" *ngIf="!isLoginMode">
          <input type="text" name="fullName" [(ngModel)]="formData.fullName" 
            placeholder="Họ và tên" class="form-input" required>
        </div>

        <div class="form-group" *ngIf="!isLoginMode">
          <input type="email" name="email" [(ngModel)]="formData.email" 
            placeholder="Email" class="form-input" required>
        </div>

        <!-- Common fields -->
        <div class="form-group">
          <input type="text" name="username" [(ngModel)]="formData.username" 
            placeholder="Tên tài khoản hoặc email" class="form-input" required>
        </div>

        <div class="form-group">
          <input type="password" name="password" [(ngModel)]="formData.password" 
            placeholder="Mật khẩu" class="form-input" required>
        </div>

        <button type="submit" class="btn-submit" [disabled]="!authForm.valid">
          {{ isLoginMode ? 'ĐĂNG NHẬP' : 'ĐĂNG KÝ' }}
        </button>

        <div class="form-footer">
          <a href="javascript:void(0)" class="footer-link">Quên mật khẩu?</a>
          <a href="javascript:void(0)" (click)="switchMode(!isLoginMode)" class="footer-link">
            {{ isLoginMode ? 'Đăng ký tại đây' : 'Đã có tài khoản? Đăng nhập' }}
          </a>
        </div>

        <div class="social-login-divider">
          <span class="divider-text">hoặc đăng nhập qua</span>
        </div>

        <div class="social-buttons">
          <button type="button" class="btn-social btn-facebook">
            <i class="fab fa-facebook-f"></i> Facebook
          </button>
          <button type="button" class="btn-social btn-google">
            <i class="fab fa-google-plus-g"></i> Google
          </button>
        </div>

        <div class="alert error" *ngIf="errorMessage">{{ errorMessage }}</div>
        <div class="alert success" *ngIf="successMessage">{{ successMessage }}</div>
      </form>
    </div>
  </div>
</div>
